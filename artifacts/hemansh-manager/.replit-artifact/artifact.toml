kind = "web"
  previewPath = "/"
  title = "Morris Manager"
  version = "1.0.0"
  id = "artifacts/hemansh-manager"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 26045

  [services.development]
  run = "pnpm --filter @workspace/morris-manager run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/morris-manager", "run", "build" ]
  publicDir = "artifacts/hemansh-manager/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "26045"
  BASE_PATH = "/"
  