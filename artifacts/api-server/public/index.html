<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liflow AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col items-center justify-center">
    <div class="max-w-2xl w-full p-8 text-center border border-zinc-800 rounded-2xl bg-zinc-900/50 shadow-2xl">
        <h1 class="text-4xl font-bold tracking-tighter mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            LIFLOW AI IS LIVE
        </h1>
        <p class="text-zinc-400 mb-8 leading-relaxed">
            Your life management backend is officially deployed. The API server is listening and ready to handle your tasks.
        </p>
        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 rounded-xl bg-zinc-800/50 border border-zinc-700">
                <span class="block text-xs uppercase tracking-widest text-zinc-500 mb-1">Status</span>
                <span class="text-emerald-400 font-mono">Active</span>
            </div>
            <div class="p-4 rounded-xl bg-zinc-800/50 border border-zinc-700">
                <span class="block text-xs uppercase tracking-widest text-zinc-500 mb-1">Environment</span>
                <span class="text-blue-400 font-mono">Production</span>
            </div>
        </div>
    </div>
</body>
</html>
